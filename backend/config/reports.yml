# Named GAQL Report Templates for the Google Ads Dashboard Skill
# Each template maps to a single MCP `search_search` call.
# Keyword Planner AMS/competition/bid data is not GAQL. Use the
# `keyword_planner_generate_ideas` and `keyword_planner_historical_metrics`
# MCP tools or the dashboard `keywordPlanner` payload for that data. Idea
# generation supports keyword-only, keyword+URL, page URL, and entire-site
# domain seeds; `plannerScore` is computed locally by the dashboard.
# The agent reads this file to know which reports to pull during a refresh.

reports:
  account_summary:
    purpose: Executive KPIs for the selected date range.
    resource: customer
    fields:
      - customer.currency_code
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  daily_trend:
    purpose: Spend, clicks, conversions, CPA, CPC, CTR and CVR by day.
    resource: ad_group
    fields:
      - segments.date
      - campaign.name
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.search_impression_share
      - metrics.conversions_value
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
    orderings:
      - "segments.date ASC"


  campaign_performance:
    purpose: Campaign-level budget allocation, CPA, CVR, CTR and spend efficiency.
    resource: campaign
    fields:
      - segments.date
      - campaign.name
      - campaign.id
      - campaign.status
      - campaign.bidding_strategy_type
      - campaign.target_cpa.target_cpa_micros
      - campaign.maximize_conversions.target_cpa_micros
      - campaign.target_roas.target_roas
      - campaign.maximize_conversion_value.target_roas
      - campaign_budget.resource_name
      - campaign_budget.amount_micros
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.conversions_value
      - metrics.search_impression_share
      - metrics.search_budget_lost_impression_share
      - metrics.search_rank_lost_impression_share
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  ad_group_performance:
    purpose: Find strong, weak or fragmented ad groups.
    resource: ad_group
    fields:
      - segments.date
      - ad_group.name
      - ad_group.id
      - ad_group.status
      - campaign.id
      - campaign.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.search_impression_share
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  keyword_performance:
    purpose: Identify keyword winners, losers, high-CPC terms and zero-conversion spend.
    resource: keyword_view
    fields:
      - segments.date
      - ad_group_criterion.keyword.text
      - ad_group_criterion.keyword.match_type
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.cpc_bid_micros
      - ad_group_criterion.status
      - ad_group.id
      - ad_group.name
      - campaign.id
      - campaign.name
      - campaign.bidding_strategy_type
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.search_impression_share
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  search_term_performance:
    purpose: Find negative keyword candidates and new exact-match opportunities.
    resource: search_term_view
    fields:
      - segments.date
      - search_term_view.search_term
      - search_term_view.status
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  device_performance:
    purpose: Segment core metrics by device type (Desktop, Mobile, Tablet).
    resource: ad_group
    fields:
      - segments.date
      - segments.device
      - campaign.name
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  day_of_week_performance:
    purpose: Identify which days perform best overall.
    resource: ad_group
    fields:
      - segments.date
      - segments.day_of_week
      - campaign.name
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  landing_page_performance:
    purpose: Compare final URLs and detect tracking or conversion issues.
    resource: landing_page_view
    fields:
      - segments.date
      - landing_page_view.unexpanded_final_url
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  day_and_hour_performance:
    purpose: Heatmap data showing performance by hour and day.
    resource: ad_group
    fields:
      - segments.date
      - segments.day_of_week
      - segments.hour
      - campaign.name
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  conversion_action_performance:
    purpose: Show which conversion actions fired, their categories, status, counting type, and attribution model.
    resource: conversion_action
    fields:
      - segments.date
      - conversion_action.id
      - conversion_action.name
      - conversion_action.type
      - conversion_action.category
      - conversion_action.status
      - conversion_action.include_in_conversions_metric
      - conversion_action.primary_for_goal
      - conversion_action.counting_type
      - conversion_action.attribution_model_settings.attribution_model
      - metrics.all_conversions
      - metrics.all_conversions_value
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
      - "metrics.all_conversions > 0"
    orderings:
      - "segments.date DESC"
      - "metrics.all_conversions DESC"

  conversion_attribution_by_search_term:
    purpose: Attribute each conversion action to search term, keyword, match type, and date.
    resource: search_term_view
    fields:
      - segments.date
      - search_term_view.search_term
      - search_term_view.status
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - segments.keyword.info.text
      - segments.keyword.info.match_type
      - segments.conversion_action_name
      - segments.conversion_action_category
      - metrics.conversions
      - metrics.all_conversions
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
      - "metrics.conversions > 0"
    orderings:
      - "segments.date DESC"
      - "metrics.conversions DESC"
    caveat: "Do not select clicks or cost with conversion_action segments; Google Ads rejects that combination."

  click_evidence_by_day:
    purpose: Expose GCLID/click metadata for one specific day, used to verify whether multiple conversions came from the same click ID.
    resource: click_view
    fields:
      - segments.date
      - click_view.gclid
      - campaign.name
      - ad_group.name
      - click_view.keyword_info.text
      - click_view.keyword_info.match_type
      - segments.device
      - segments.click_type
      - segments.slot
      - metrics.clicks
    conditions:
      - "segments.date = '<YYYY-MM-DD>'"
    caveat: "ClickView requires a single-day date filter. It does not include website session events; persist GCLID/GBRAID/WBRAID in your app for exact session proof."

  change_history:
    purpose: Read-only Google Ads change history used to detect confounders during proposal impact scoring.
    resource: change_event
    fields:
      - change_event.change_date_time
      - change_event.change_resource_type
      - change_event.changed_fields
      - change_event.client_type
      - change_event.resource_change_operation
      - change_event.user_email
      - change_event.old_resource
      - change_event.new_resource
      - change_event.resource_name
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
    conditions:
      - "change_event.change_date_time BETWEEN '<CHANGE_START_DATE>' AND '<CHANGE_END_DATE>'"
    orderings:
      - "change_event.change_date_time DESC"
    limit: 10000
    caveat: "Google Ads exposes change_event only for a recent rolling window; the refresh pipeline archives fetched rows in Postgres for later 14/30-day scoring."

  quality_score:
    purpose: Diagnose rank by keyword Quality Score, ad relevance, landing-page experience, and predicted CTR.
    resource: ad_group_criterion
    fields:
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.keyword.text
      - ad_group_criterion.keyword.match_type
      - ad_group_criterion.status
      - ad_group_criterion.quality_info.quality_score
      - ad_group_criterion.quality_info.creative_quality_score
      - ad_group_criterion.quality_info.post_click_quality_score
      - ad_group_criterion.quality_info.search_predicted_ctr
    conditions:
      - "ad_group_criterion.type = KEYWORD"
      - "ad_group_criterion.status != REMOVED"
    orderings:
      - "ad_group_criterion.keyword.text ASC"

  conversion_action_metrics_by_ad_group:
    purpose: Campaign-level conversion action metrics for joining with account-level configs.
    resource: ad_group
    fields:
      - segments.date
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - segments.conversion_action_name
      - segments.conversion_action_category
      - metrics.conversions
      - metrics.conversions_value
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
      - "metrics.conversions > 0"

  configured_keywords:
    purpose: Fetch all configured positive keywords (enabled, paused, and removed) regardless of traffic.
    resource: ad_group_criterion
    fields:
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.keyword.text
      - ad_group_criterion.keyword.match_type
      - ad_group_criterion.status
      - ad_group_criterion.final_urls
      - ad_group_criterion.primary_status
      - ad_group_criterion.primary_status_reasons
    conditions:
      - "ad_group_criterion.type = KEYWORD"
      - "ad_group_criterion.negative = FALSE"

  campaign_negatives:
    purpose: Fetch campaign-level negative keywords.
    resource: campaign_criterion
    fields:
      - campaign.id
      - campaign.name
      - campaign_criterion.criterion_id
      - campaign_criterion.keyword.text
      - campaign_criterion.keyword.match_type
      - campaign_criterion.negative
    conditions:
      - "campaign_criterion.type = KEYWORD"
      - "campaign_criterion.negative = TRUE"

  ad_group_negatives:
    purpose: Fetch ad group-level negative keywords.
    resource: ad_group_criterion
    fields:
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.keyword.text
      - ad_group_criterion.keyword.match_type
      - ad_group_criterion.negative
      - ad_group_criterion.status
    conditions:
      - "ad_group_criterion.type = KEYWORD"
      - "ad_group_criterion.negative = TRUE"
