# Named GAQL Report Templates for the Google Ads Dashboard Skill
# The refresh pipeline reads backend/config/reports.yml; keep the
# google-ads-skill/references/reports.yml copy in sync for agent reference.
# Agents can use these templates to shape bounded raw GAQL `search_search` calls.
# `search_search` requires explicit LIMIT, requires `segments.date` filters for
# metric queries, enforces `maxRows`, returns structured rows/rowCount/truncated/
# requestId/apiVersion/warnings, and may reject broad multi-segment queries
# without campaign/ad-group/criterion scope.
# Keyword Planner AMS/competition/bid data is not GAQL. Use the
# `keyword_planner_generate_ideas` and `keyword_planner_historical_metrics`
# MCP tools or the dashboard `keywordPlanner` payload for that data. Idea
# generation supports keyword-only, keyword+URL, page URL, and entire-site
# domain seeds; `plannerScore` is computed locally by the dashboard and shared
# with deterministic `PLANNER_EXPANSION` signals.

reports:
  account_summary:
    purpose: Executive KPIs for the selected date range.
    resource: customer
    fields:
      - segments.date
      - customer.id
      - customer.currency_code
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  daily_trend:
    purpose: Spend, clicks, conversions, CPA, CPC, CTR and CVR by day.
    resource: ad_group
    fields:
      - segments.date
      - campaign.name
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.search_impression_share
      - metrics.conversions_value
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
    orderings:
      - "segments.date ASC"


  campaign_performance:
    purpose: Campaign-level budget allocation, CPA, CVR, CTR and spend efficiency.
    resource: campaign
    fields:
      - segments.date
      - campaign.name
      - campaign.id
      - campaign.status
      - campaign.bidding_strategy_type
      - campaign.target_cpa.target_cpa_micros
      - campaign.maximize_conversions.target_cpa_micros
      - campaign.target_roas.target_roas
      - campaign.maximize_conversion_value.target_roas
      - campaign_budget.resource_name
      - campaign_budget.amount_micros
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.conversions_value
      - metrics.search_impression_share
      - metrics.search_budget_lost_impression_share
      - metrics.search_rank_lost_impression_share
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  campaign_config:
    purpose: Current campaign configuration snapshot independent of date-window metrics.
    resource: campaign
    fields:
      - campaign.name
      - campaign.id
      - campaign.status
      - campaign.advertising_channel_type
      - campaign.advertising_channel_sub_type
      - campaign.targeting_setting.target_restrictions
      - campaign.bidding_strategy_type
      - campaign.target_cpa.target_cpa_micros
      - campaign.maximize_conversions.target_cpa_micros
      - campaign.target_roas.target_roas
      - campaign.maximize_conversion_value.target_roas
      - campaign_budget.resource_name
      - campaign_budget.amount_micros
    conditions:
      - "campaign.status != REMOVED"

  ad_group_performance:
    purpose: Find strong, weak or fragmented ad groups.
    resource: ad_group
    fields:
      - segments.date
      - ad_group.name
      - ad_group.id
      - ad_group.status
      - campaign.id
      - campaign.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.search_impression_share
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  ad_group_config:
    purpose: Current ad group configuration snapshot independent of date-window metrics.
    resource: ad_group
    fields:
      - ad_group.name
      - ad_group.id
      - ad_group.status
      - ad_group.targeting_setting.target_restrictions
      - campaign.id
      - campaign.name
    conditions:
      - "ad_group.status != REMOVED"

  campaign_audience_performance:
    purpose: Campaign-level audience performance for configured audience criteria.
    resource: campaign_audience_view
    fields:
      - segments.date
      - campaign.id
      - campaign.name
      - campaign_criterion.criterion_id
      - campaign_criterion.resource_name
      - campaign_criterion.type
      - campaign_criterion.negative
      - campaign_criterion.status
      - campaign_criterion.bid_modifier
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.interactions
      - metrics.interaction_rate
      - metrics.engagements
      - metrics.engagement_rate
      - metrics.active_view_impressions
      - metrics.active_view_measurable_impressions
      - metrics.active_view_measurable_cost_micros
      - metrics.active_view_viewability
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  ad_group_audience_performance:
    purpose: Ad-group-level audience performance for configured audience criteria.
    resource: ad_group_audience_view
    fields:
      - segments.date
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.type
      - ad_group_criterion.negative
      - ad_group_criterion.status
      - ad_group_criterion.bid_modifier
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.interactions
      - metrics.interaction_rate
      - metrics.engagements
      - metrics.engagement_rate
      - metrics.active_view_impressions
      - metrics.active_view_measurable_impressions
      - metrics.active_view_measurable_cost_micros
      - metrics.active_view_viewability
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  age_range_performance:
    purpose: Age-range performance and configuration at ad-group level.
    resource: age_range_view
    fields: &demographic_performance_fields
      - segments.date
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.age_range.type
      - ad_group_criterion.negative
      - ad_group_criterion.status
      - ad_group_criterion.bid_modifier
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.interactions
      - metrics.interaction_rate
      - metrics.engagements
      - metrics.engagement_rate
      - metrics.active_view_impressions
      - metrics.active_view_measurable_impressions
      - metrics.active_view_measurable_cost_micros
      - metrics.active_view_viewability
    conditions: &demographic_date_conditions
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  gender_performance:
    purpose: Gender performance and configuration at ad-group level.
    resource: gender_view
    fields:
      - segments.date
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.gender.type
      - ad_group_criterion.negative
      - ad_group_criterion.status
      - ad_group_criterion.bid_modifier
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.interactions
      - metrics.interaction_rate
      - metrics.engagements
      - metrics.engagement_rate
      - metrics.active_view_impressions
      - metrics.active_view_measurable_impressions
      - metrics.active_view_measurable_cost_micros
      - metrics.active_view_viewability
    conditions: *demographic_date_conditions

  income_range_performance:
    purpose: Household-income performance and configuration at ad-group level where supported.
    resource: income_range_view
    fields:
      - segments.date
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.income_range.type
      - ad_group_criterion.negative
      - ad_group_criterion.status
      - ad_group_criterion.bid_modifier
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.interactions
      - metrics.interaction_rate
      - metrics.engagements
      - metrics.engagement_rate
      - metrics.active_view_impressions
      - metrics.active_view_measurable_impressions
      - metrics.active_view_measurable_cost_micros
      - metrics.active_view_viewability
    conditions: *demographic_date_conditions

  parental_status_performance:
    purpose: Parental-status performance and configuration at ad-group level.
    resource: parental_status_view
    fields:
      - segments.date
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.parental_status.type
      - ad_group_criterion.negative
      - ad_group_criterion.status
      - ad_group_criterion.bid_modifier
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.interactions
      - metrics.interaction_rate
      - metrics.engagements
      - metrics.engagement_rate
      - metrics.active_view_impressions
      - metrics.active_view_measurable_impressions
      - metrics.active_view_measurable_cost_micros
      - metrics.active_view_viewability
    conditions: *demographic_date_conditions

  campaign_audience_criteria:
    purpose: Current campaign audience targeting, exclusions and demographic criteria.
    resource: campaign_criterion
    fields: &campaign_audience_criterion_fields
      - campaign.id
      - campaign.name
      - campaign_criterion.criterion_id
      - campaign_criterion.resource_name
      - campaign_criterion.type
      - campaign_criterion.status
      - campaign_criterion.negative
      - campaign_criterion.bid_modifier
      - campaign_criterion.user_interest.user_interest_category
      - campaign_criterion.user_list.user_list
      - campaign_criterion.custom_audience.custom_audience
      - campaign_criterion.combined_audience.combined_audience
      - campaign_criterion.life_event.life_event_id
      - campaign_criterion.extended_demographic.extended_demographic_id
      - campaign_criterion.age_range.type
      - campaign_criterion.gender.type
      - campaign_criterion.income_range.type
      - campaign_criterion.parental_status.type
    conditions:
      - "campaign.status != REMOVED"
      - "campaign_criterion.type IN (AUDIENCE, USER_INTEREST, USER_LIST, CUSTOM_AUDIENCE, COMBINED_AUDIENCE, LIFE_EVENT, AGE_RANGE, GENDER, INCOME_RANGE, PARENTAL_STATUS)"

  ad_group_audience_criteria:
    purpose: Current ad-group audience targeting, exclusions and demographic criteria.
    resource: ad_group_criterion
    fields:
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.type
      - ad_group_criterion.status
      - ad_group_criterion.negative
      - ad_group_criterion.bid_modifier
      - ad_group_criterion.audience.audience
      - ad_group_criterion.user_interest.user_interest_category
      - ad_group_criterion.user_list.user_list
      - ad_group_criterion.custom_audience.custom_audience
      - ad_group_criterion.combined_audience.combined_audience
      - ad_group_criterion.life_event.life_event_id
      - ad_group_criterion.extended_demographic.extended_demographic_id
      - ad_group_criterion.age_range.type
      - ad_group_criterion.gender.type
      - ad_group_criterion.income_range.type
      - ad_group_criterion.parental_status.type
    conditions:
      - "campaign.status != REMOVED"
      - "ad_group.status != REMOVED"
      - "ad_group_criterion.type IN (AUDIENCE, USER_INTEREST, USER_LIST, CUSTOM_AUDIENCE, COMBINED_AUDIENCE, LIFE_EVENT, AGE_RANGE, GENDER, INCOME_RANGE, PARENTAL_STATUS)"

  user_interest_catalog:
    purpose: Public affinity and in-market audience taxonomy available for targeting.
    resource: user_interest
    fields:
      - user_interest.resource_name
      - user_interest.user_interest_id
      - user_interest.name
      - user_interest.taxonomy_type
      - user_interest.user_interest_parent

  life_event_catalog:
    purpose: Public life-event audience taxonomy available for targeting.
    resource: life_event
    fields:
      - life_event.resource_name
      - life_event.id
      - life_event.name
      - life_event.parent

  detailed_demographic_catalog:
    purpose: Public detailed-demographic taxonomy available for targeting.
    resource: detailed_demographic
    fields:
      - detailed_demographic.resource_name
      - detailed_demographic.id
      - detailed_demographic.name
      - detailed_demographic.parent

  user_list_catalog:
    purpose: Customer-owned data segments available for targeting.
    resource: user_list
    fields:
      - user_list.resource_name
      - user_list.id
      - user_list.name
      - user_list.description
      - user_list.type
      - user_list.membership_status
      - user_list.eligible_for_search
      - user_list.eligible_for_display
      - user_list.size_for_search
      - user_list.size_for_display
      - user_list.membership_life_span
      - user_list.read_only

  custom_audience_catalog:
    purpose: Customer custom segments available for targeting and editing.
    resource: custom_audience
    fields:
      - custom_audience.resource_name
      - custom_audience.id
      - custom_audience.name
      - custom_audience.description
      - custom_audience.status
      - custom_audience.type
      - custom_audience.members

  combined_audience_catalog:
    purpose: Customer combined segments available for targeting.
    resource: combined_audience
    fields:
      - combined_audience.resource_name
      - combined_audience.id
      - combined_audience.name
      - combined_audience.description
      - combined_audience.status

  audience_catalog:
    purpose: Customer-created composed audiences available for ad-group targeting.
    resource: audience
    fields:
      - audience.resource_name
      - audience.id
      - audience.name
      - audience.description
      - audience.status
      - audience.scope
      - audience.dimensions
      - audience.exclusion_dimension

  keyword_performance:
    purpose: Identify keyword winners, losers, high-CPC terms and zero-conversion spend.
    resource: keyword_view
    fields:
      - segments.date
      - ad_group_criterion.keyword.text
      - ad_group_criterion.keyword.match_type
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.cpc_bid_micros
      - ad_group_criterion.status
      - ad_group.id
      - ad_group.name
      - campaign.id
      - campaign.name
      - campaign.bidding_strategy_type
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.search_impression_share
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  keyword_click_details:
    purpose: Feed the Overview click details modal with aggregated keyword/date/slot/device click counts without fetching click-level GCLIDs.
    resource: keyword_view
    fields:
      - segments.date
      - segments.device
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.keyword.text
      - ad_group_criterion.keyword.match_type
      - segments.slot
      - metrics.clicks
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
      - "metrics.clicks > 0"
    orderings:
      - "segments.date DESC"
      - "metrics.clicks DESC"

  search_term_performance:
    purpose: Read-only search term performance including matched keyword, match types, and match source. Google may hide low-volume queries per its privacy policy.
    resource: search_term_view
    fields:
      - segments.date
      - search_term_view.search_term
      - search_term_view.status
      - segments.keyword.info.text
      - segments.keyword.info.match_type
      - segments.search_term_match_type
      - segments.search_term_match_source
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.all_conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
    caveat: "Google Ads may omit low-volume search terms per its privacy policy. Absence of a term does not prove no queries occurred."

  device_performance:
    purpose: Segment core metrics by device type (Desktop, Mobile, Tablet).
    resource: ad_group
    fields:
      - segments.date
      - segments.device
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  day_of_week_performance:
    purpose: Identify which days perform best overall.
    resource: ad_group
    fields:
      - segments.date
      - segments.day_of_week
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.conversions_value
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  landing_page_performance:
    purpose: Compare unexpanded final URLs for conversion issues, mobile-friendliness, AMP validity, and speed scores.
    resource: landing_page_view
    fields:
      - segments.date
      - landing_page_view.unexpanded_final_url
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.mobile_friendly_clicks_percentage
      - metrics.valid_accelerated_mobile_pages_clicks_percentage
      - metrics.speed_score
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
    caveat: "mobile_friendly_clicks_percentage, valid_accelerated_mobile_pages_clicks_percentage, and speed_score may be null for campaigns without sufficient data."

  expanded_landing_page_performance:
    purpose: Expanded final URL performance including mobile-friendliness, AMP validity, and speed scores. Provides Google-style expanded landing pages drill-down.
    resource: expanded_landing_page_view
    fields:
      - segments.date
      - expanded_landing_page_view.expanded_final_url
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
      - metrics.mobile_friendly_clicks_percentage
      - metrics.valid_accelerated_mobile_pages_clicks_percentage
      - metrics.speed_score
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
    caveat: "Expanded final URLs include ValueTrack parameter substitution. mobile_friendly_clicks_percentage, valid_accelerated_mobile_pages_clicks_percentage, and speed_score may be null for campaigns without sufficient data."

  day_and_hour_performance:
    purpose: Heatmap data showing performance by hour and day.
    resource: ad_group
    fields:
      - segments.date
      - segments.day_of_week
      - segments.hour
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - metrics.cost_micros
      - metrics.clicks
      - metrics.impressions
      - metrics.conversions
      - metrics.ctr
      - metrics.average_cpc
      - metrics.cost_per_conversion
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"

  conversion_action_performance:
    purpose: Show which conversion actions fired, their categories, status, counting type, and attribution model.
    resource: conversion_action
    fields:
      - segments.date
      - conversion_action.resource_name
      - conversion_action.id
      - conversion_action.name
      - conversion_action.type
      - conversion_action.category
      - conversion_action.status
      - conversion_action.include_in_conversions_metric
      - conversion_action.primary_for_goal
      - conversion_action.counting_type
      - conversion_action.attribution_model_settings.attribution_model
      - metrics.all_conversions
      - metrics.all_conversions_value
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
      - "metrics.all_conversions > 0"
    orderings:
      - "segments.date DESC"
      - "metrics.all_conversions DESC"

  conversion_attribution_by_search_term:
    purpose: Attribute each conversion action to search term, keyword, match type, and date.
    resource: search_term_view
    fields:
      - segments.date
      - search_term_view.search_term
      - search_term_view.status
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - segments.keyword.info.text
      - segments.keyword.info.match_type
      - segments.conversion_action_name
      - segments.conversion_action_category
      - metrics.conversions
      - metrics.conversions_value
      - metrics.all_conversions
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
      - "metrics.conversions > 0"
    orderings:
      - "segments.date DESC"
      - "metrics.conversions DESC"
    caveat: "Do not select clicks or cost with conversion_action segments; Google Ads rejects that combination."

  change_history:
    purpose: Read-only Google Ads change history used to detect confounders during proposal impact scoring.
    resource: change_event
    fields:
      - change_event.change_date_time
      - change_event.change_resource_type
      - change_event.changed_fields
      - change_event.client_type
      - change_event.resource_change_operation
      - change_event.user_email
      - change_event.old_resource
      - change_event.new_resource
      - change_event.resource_name
      - change_event.campaign
      - change_event.ad_group
    conditions:
      - "change_event.change_date_time BETWEEN '<CHANGE_START_DATE>' AND '<CHANGE_END_DATE>'"
    orderings:
      - "change_event.change_date_time DESC"
    limit: 10000
    caveat: "Google Ads exposes change_event only for a recent rolling window; the refresh pipeline archives fetched rows in Postgres for later 14/30-day scoring."

  quality_score:
    purpose: Diagnose rank by keyword Quality Score, ad relevance, landing-page experience, and predicted CTR.
    resource: ad_group_criterion
    fields:
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.keyword.text
      - ad_group_criterion.keyword.match_type
      - ad_group_criterion.status
      - ad_group_criterion.quality_info.quality_score
      - ad_group_criterion.quality_info.creative_quality_score
      - ad_group_criterion.quality_info.post_click_quality_score
      - ad_group_criterion.quality_info.search_predicted_ctr
    conditions:
      - "ad_group_criterion.type = KEYWORD"
      - "ad_group_criterion.status != REMOVED"
    orderings:
      - "ad_group_criterion.keyword.text ASC"

  conversion_action_metrics_by_ad_group:
    purpose: Campaign-level conversion action metrics for joining with account-level configs.
    resource: ad_group
    fields:
      - segments.date
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - segments.conversion_action_name
      - segments.conversion_action_category
      - metrics.conversions
      - metrics.conversions_value
    conditions:
      - "segments.date BETWEEN '<START_DATE>' AND '<END_DATE>'"
      - "metrics.conversions > 0"

  configured_keywords:
    purpose: Fetch all configured positive keywords (enabled, paused, and removed) regardless of traffic.
    resource: ad_group_criterion
    fields:
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.resource_name
      - ad_group_criterion.keyword.text
      - ad_group_criterion.keyword.match_type
      - ad_group_criterion.status
      - ad_group_criterion.cpc_bid_micros
      - ad_group_criterion.final_urls
      - ad_group_criterion.primary_status
      - ad_group_criterion.primary_status_reasons
    conditions:
      - "ad_group_criterion.type = KEYWORD"
      - "ad_group_criterion.negative = FALSE"

  campaign_negatives:
    purpose: Fetch campaign-level negative keywords.
    resource: campaign_criterion
    fields:
      - campaign.id
      - campaign.name
      - campaign_criterion.criterion_id
      - campaign_criterion.keyword.text
      - campaign_criterion.keyword.match_type
      - campaign_criterion.negative
      - campaign_criterion.status
    conditions:
      - "campaign_criterion.type = KEYWORD"
      - "campaign_criterion.negative = TRUE"

  ad_group_negatives:
    purpose: Fetch ad group-level negative keywords.
    resource: ad_group_criterion
    fields:
      - campaign.id
      - campaign.name
      - ad_group.id
      - ad_group.name
      - ad_group_criterion.criterion_id
      - ad_group_criterion.keyword.text
      - ad_group_criterion.keyword.match_type
      - ad_group_criterion.negative
      - ad_group_criterion.status
    conditions:
      - "ad_group_criterion.type = KEYWORD"
      - "ad_group_criterion.negative = TRUE"

  account_negatives:
    purpose: Fetch account-level negative keyword list attachments. Join customer_negative_criterion.negative_keyword_list.shared_set with shared_negative_criteria to resolve the list keywords.
    resource: customer_negative_criterion
    fields:
      - customer.id
      - customer_negative_criterion.id
      - customer_negative_criterion.resource_name
      - customer_negative_criterion.type
      - customer_negative_criterion.negative_keyword_list.shared_set
    conditions:
      - "customer_negative_criterion.type = NEGATIVE_KEYWORD_LIST"

  shared_negative_sets:
    purpose: Fetch shared negative keyword list metadata, including status. Removed or disabled shared sets must not be treated as active negative coverage.
    resource: shared_set
    fields:
      - shared_set.id
      - shared_set.resource_name
      - shared_set.name
      - shared_set.type
      - shared_set.status
    conditions:
      - "shared_set.type = NEGATIVE_KEYWORDS"

  shared_negative_criteria:
    purpose: Fetch keywords inside shared negative keyword lists.
    resource: shared_criterion
    fields:
      - shared_criterion.shared_set
      - shared_criterion.criterion_id
      - shared_criterion.type
      - shared_criterion.keyword.text
      - shared_criterion.keyword.match_type
    conditions:
      - "shared_criterion.type = KEYWORD"

  campaign_shared_sets:
    purpose: Fetch campaign attachments for shared negative keyword lists, including attachment status. Removed or disabled attachments must not be treated as active shared-list coverage.
    resource: campaign_shared_set
    fields:
      - campaign.id
      - campaign.name
      - campaign_shared_set.campaign
      - campaign_shared_set.shared_set
      - campaign_shared_set.status

  campaign_ad_schedules:
    purpose: Fetch campaign-level ad schedule criteria for read-back in the Ad Schedule page before previewing immutable remove/create schedule edits.
    resource: campaign_criterion
    fields:
      - campaign.id
      - campaign.name
      - campaign_criterion.criterion_id
      - campaign_criterion.resource_name
      - campaign_criterion.status
      - campaign_criterion.ad_schedule.day_of_week
      - campaign_criterion.ad_schedule.start_hour
      - campaign_criterion.ad_schedule.start_minute
      - campaign_criterion.ad_schedule.end_hour
      - campaign_criterion.ad_schedule.end_minute
    conditions:
      - "campaign_criterion.type = AD_SCHEDULE"
      - "campaign_criterion.status != REMOVED"
